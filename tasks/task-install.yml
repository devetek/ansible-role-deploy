---
- ansible.builtin.include_tasks: preflight.yml

- name: Select main binary version
  ansible.builtin.include_tasks: "language/{{ deploy_service_language_name }}.yml"
  when: deploy_service_language_name != ""



- block:
  - name: Check if extra binary is valid
    ansible.builtin.set_fact:
      deploy_extra_languages_fact: "{{ deploy_extra_languages | default([]) }}"
    when: deploy_extra_languages is defined and deploy_extra_languages is iterable

  - name: Add extra binary version
    ansible.builtin.include_tasks: "language/{{ extra_binary.name }}.yml"
    loop: "{{ deploy_extra_languages_fact }}"
    loop_control:
      loop_var: extra_binary
    vars:
      deploy_service_language_name_extra: "{{ extra_binary.name }}"
      deploy_service_language_version_extra: "{{ extra_binary.version }}"
    when: deploy_extra_languages_fact is defined and deploy_extra_languages_fact is iterable

- name: Ensure application work directory exists
  ansible.builtin.file:
    path: "{{ deploy_workdir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "{{ deploy_workdir_mode }}"
  when: deploy_manage_workdir | bool

- name: Verify application work directory exists
  ansible.builtin.stat:
    path: "{{ deploy_workdir }}"
  register: deploy_workdir_stat

- name: Fail when application work directory is missing
  ansible.builtin.fail:
    msg: "Application work directory {{ deploy_workdir }} does not exist."
  when: not deploy_workdir_stat.stat.exists

- name: Create systemd service
  ansible.builtin.template:
    src: dpanel.service
    dest: "{{ deploy_systemd_unit_dir }}/{{ deploy_service_name }}.service"
    owner: "{{ deploy_systemd_unit_owner }}"
    group: "{{ deploy_systemd_unit_group }}"
    mode: 0644
  register: deploy_systemd_unit

- name: Reset failed systemd state before restart
  ansible.builtin.command: "systemctl reset-failed {{ deploy_service_name }}.service"
  changed_when: false
  failed_when: false
  when: deploy_systemd_reset_failed_before_restart | bool

- name: Apply service state {{ deploy_service_name }}
  ansible.builtin.systemd:
    daemon_reload: true
    name: "{{ deploy_service_name }}"
    state: "{{ deploy_systemd_service_state }}"
    enabled: true

- name: Verify service {{ deploy_service_name }} is active
  ansible.builtin.command: "systemctl is-active {{ deploy_service_name }}.service"
  changed_when: false
  register: deploy_service_active
  retries: 6
  delay: 2
  until: deploy_service_active.stdout == "active"
  when:
    - deploy_systemd_verify_active | bool
    - deploy_systemd_service_state in ["started", "restarted"]
